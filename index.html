/* ══════════════ CSS ══════════════════════════════════════════ */
const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Bebas+Neue&family=Tajawal:wght@300;400;500;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060608;--bg1:#0c0c10;--bg2:#111116;--bg3:#16161e;
  --s1:#1a1a24;--s2:#20202e;--s3:#2a2a3e;--s4:#343450;
  --red:#e50914;--red2:#ff2030;--red3:#ff7070;--redbg:rgba(229,9,20,.1);--redbr:rgba(229,9,20,.25);
  --gold:#f5c518;--cyan:#00d4ff;--green:#1db954;--purp:#9b59b6;
  --t1:#ffffff;--t2:#b0b0c8;--t3:#606078;--t4:#383850;
  --r:10px;--r2:14px;--tr:.22s cubic-bezier(.4,0,.2,1);
  --shadow:0 8px 40px rgba(0,0,0,.8);
  --glow:0 0 40px rgba(229,9,20,.3);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--t1);font-family:'Cairo',sans-serif;overflow-x:hidden;direction:rtl}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--red);border-radius:4px}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:.85rem 3rem;transition:all .5s}
.nav.t{background:linear-gradient(180deg,rgba(6,6,8,.95) 0%,transparent 100%)}
.nav.s{background:rgba(6,6,8,.96);backdrop-filter:blur(28px);box-shadow:0 1px 0 rgba(255,255,255,.04),0 4px 30px rgba(0,0,0,.5)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;font-weight:400;cursor:pointer;letter-spacing:3px;background:linear-gradient(135deg,#fff 0%,var(--red) 60%,#ff4444 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 12px rgba(229,9,20,.4))}
.nav-links{display:flex;gap:2rem}
.nl{font-size:.8rem;cursor:pointer;color:var(--t3);transition:all .25s;padding:.3rem 0;position:relative;letter-spacing:.5px}
.nl::after{content:'';position:absolute;bottom:-2px;right:0;left:0;height:2px;background:var(--red);border-radius:1px;transform:scaleX(0);transition:transform .25s}
.nl:hover{color:var(--t1)}.nl:hover::after{transform:scaleX(1)}
.nl.a{color:var(--t1)}.nl.a::after{transform:scaleX(1)}
.nav-r{display:flex;align-items:center;gap:.5rem}
.ni{background:none;border:none;color:var(--t2);font-size:1rem;cursor:pointer;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all var(--tr)}
.ni:hover{background:var(--s2);color:var(--t1)}
.av-wrap{position:relative}
.av{width:34px;height:34px;border-radius:50%;object-fit:cover;cursor:pointer;border:2px solid var(--s3);transition:all var(--tr);box-shadow:0 0 0 0 rgba(229,9,20,0)}
.av:hover{border-color:var(--red);box-shadow:0 0 0 3px rgba(229,9,20,.2)}
.umenu{position:absolute;left:0;top:calc(100% + .8rem);background:rgba(17,17,22,.98);border:1px solid var(--s3);border-radius:16px;min-width:240px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.9);animation:mIn .22s cubic-bezier(.4,0,.2,1);z-index:500;backdrop-filter:blur(20px)}
@keyframes mIn{from{opacity:0;transform:translateY(-10px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.umenu-head{padding:1.1rem 1rem;display:flex;align-items:center;gap:.8rem;border-bottom:1px solid var(--s2);background:linear-gradient(135deg,var(--s1) 0%,rgba(229,9,20,.05) 100%)}
.umenu-head img{width:42px;height:42px;border-radius:50%;border:2px solid var(--red);box-shadow:0 0 12px rgba(229,9,20,.3)}
.umenu-head .nm{font-weight:700;font-size:.85rem}
.umenu-head .em{font-size:.65rem;color:var(--t3);margin-top:.15rem}
.mi{display:flex;align-items:center;gap:.7rem;padding:.72rem 1rem;font-size:.8rem;cursor:pointer;transition:all var(--tr);width:100%;background:none;border:none;color:var(--t2);text-align:right}
.mi:hover{background:var(--s2);color:var(--t1);padding-right:1.3rem}
.md{height:1px;background:var(--s2);margin:.2rem 0}
.btn-in{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--t1);padding:.45rem 1.1rem;border-radius:8px;cursor:pointer;font-size:.78rem;font-family:'Cairo',sans-serif;transition:all var(--tr);letter-spacing:.3px}
.btn-in:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.2)}
.btn-up{background:linear-gradient(135deg,var(--red) 0%,#c0000a 100%);border:none;color:#fff;padding:.45rem 1.1rem;border-radius:8px;cursor:pointer;font-size:.78rem;font-family:'Cairo',sans-serif;font-weight:700;transition:all var(--tr);box-shadow:0 2px 12px rgba(229,9,20,.3);letter-spacing:.3px}
.btn-up:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(229,9,20,.5)}

/* HERO */
.hero{position:relative;height:100vh;min-height:620px;display:flex;align-items:flex-end;overflow:hidden}
.hero-bg{position:absolute;inset:0}
.hero-bg img{width:100%;height:100%;object-fit:cover;animation:kb 24s ease infinite alternate;transform-origin:center center}
@keyframes kb{0%{transform:scale(1) translateX(0)}50%{transform:scale(1.04) translateX(-1%)}100%{transform:scale(1.08) translateX(1%)}}
.hero-ov{position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,rgba(6,6,8,.5) 35%,rgba(6,6,8,.15) 65%,transparent 100%)}
.hero-ov2{position:absolute;inset:0;background:linear-gradient(to left,transparent 40%,rgba(6,6,8,.85) 100%)}
.hero-ov3{position:absolute;inset:0;background:radial-gradient(ellipse at 80% 50%,rgba(229,9,20,.06) 0%,transparent 60%)}
.hero-c{position:relative;z-index:2;padding:5rem 3rem;max-width:700px;animation:heroIn .8s cubic-bezier(.4,0,.2,1) both}
@keyframes heroIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.gpill{background:rgba(229,9,20,.15);border:1px solid rgba(229,9,20,.35);color:var(--red3);padding:.25rem .75rem;border-radius:20px;font-size:.65rem;font-weight:700;letter-spacing:.8px;backdrop-filter:blur(4px)}
.hero-badge{display:inline-flex;align-items:center;gap:.5rem;background:rgba(245,197,24,.12);border:1px solid rgba(245,197,24,.25);color:var(--gold);padding:.25rem .75rem;border-radius:20px;font-size:.62rem;font-weight:700;letter-spacing:.8px}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,7vw,5.5rem);font-weight:400;line-height:1;margin-bottom:.6rem;letter-spacing:3px;text-shadow:0 4px 30px rgba(0,0,0,.6)}
.hero-meta{display:flex;gap:.9rem;align-items:center;flex-wrap:wrap;margin-bottom:.9rem;font-size:.8rem}
.hero-meta-dot{width:4px;height:4px;border-radius:50%;background:var(--t4)}
.hero-rating{display:flex;align-items:center;gap:.3rem;color:var(--gold);font-weight:700}
.hero-desc{color:rgba(176,176,200,.85);font-size:.88rem;line-height:1.8;max-width:520px;margin-bottom:1.8rem;font-family:'Tajawal',sans-serif;font-weight:400}
.hero-btns{display:flex;gap:.9rem;flex-wrap:wrap;align-items:center}
.btn-play{background:linear-gradient(135deg,var(--red) 0%,#b5000a 100%);border:none;color:#fff;padding:.85rem 2.2rem;border-radius:10px;cursor:pointer;font-size:.9rem;font-family:'Cairo',sans-serif;font-weight:700;display:flex;align-items:center;gap:.55rem;transition:all .3s;box-shadow:0 4px 20px rgba(229,9,20,.4);letter-spacing:.3px}
.btn-play:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 8px 35px rgba(229,9,20,.55)}
.btn-play:active{transform:translateY(0) scale(.98)}
.btn-ol{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:var(--t1);padding:.85rem 1.8rem;border-radius:10px;cursor:pointer;font-size:.9rem;font-family:'Cairo',sans-serif;font-weight:600;transition:all .3s;backdrop-filter:blur(8px)}
.btn-ol:hover{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.3)}
/* hero indicators */
.hero-dots{position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%);display:flex;gap:.5rem;z-index:5}
.hero-dot{width:24px;height:3px;border-radius:2px;background:rgba(255,255,255,.2);transition:all .4s}
.hero-dot.a{background:var(--red);width:40px}

/* ROWS */
.row{padding:.2rem 0 2.5rem}
.row-hd{display:flex;align-items:center;justify-content:space-between;padding:.5rem 3rem 1.1rem}
.row-hd-l{display:flex;align-items:center;gap:.7rem}
.row-bar{width:3px;height:20px;background:linear-gradient(180deg,var(--red) 0%,rgba(229,9,20,.3) 100%);border-radius:2px}
.row-title{font-family:'Bebas Neue',sans-serif;font-size:1.25rem;font-weight:400;letter-spacing:2px;color:var(--t1)}
.row-more{font-size:.7rem;color:var(--t3);cursor:pointer;transition:color .2s;letter-spacing:.3px;display:flex;align-items:center;gap:.3rem}
.row-more:hover{color:var(--red)}
.slider{display:flex;gap:1rem;overflow-x:auto;padding:.4rem 3rem 1.2rem;scroll-snap-type:x mandatory;scrollbar-width:none}
.slider::-webkit-scrollbar{display:none}

/* CARD */
.card{flex-shrink:0;width:162px;cursor:pointer;position:relative;scroll-snap-align:start;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.card:hover{transform:translateY(-10px) scale(1.04);z-index:5}
.card-img{width:162px;height:243px;object-fit:cover;border-radius:10px;background:var(--s2);display:block;transition:box-shadow .3s}
.card:hover .card-img{box-shadow:0 20px 50px rgba(0,0,0,.7),0 0 0 1px rgba(229,9,20,.2)}
.card-ov{position:absolute;inset:0;border-radius:10px;background:linear-gradient(to top,rgba(6,6,8,.98) 0%,rgba(6,6,8,.4) 50%,transparent 100%);opacity:0;transition:opacity .3s}
.card:hover .card-ov{opacity:1}
.card-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.7);width:46px;height:46px;border-radius:50%;background:rgba(229,9,20,.9);display:flex;align-items:center;justify-content:center;opacity:0;transition:all .3s;font-size:1rem;box-shadow:0 0 0 8px rgba(229,9,20,.2)}
.card:hover .card-play{opacity:1;transform:translate(-50%,-50%) scale(1)}
.card-info{position:absolute;bottom:0;left:0;right:0;padding:.7rem .65rem;opacity:0;transition:opacity .3s;transform:translateY(4px);transition:all .3s}
.card:hover .card-info{opacity:1;transform:translateY(0)}
.card-title{font-size:.74rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:.22rem}
.card-meta{font-size:.62rem;color:var(--t3);display:flex;gap:.45rem;align-items:center}
.card-badge{position:absolute;top:.55rem;right:.55rem;background:linear-gradient(135deg,var(--red),#b5000a);color:#fff;font-size:.56rem;font-weight:700;padding:.15rem .4rem;border-radius:5px;letter-spacing:.5px}
.card-fav{position:absolute;top:.55rem;left:.55rem;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.1);color:var(--red3);cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .25s;backdrop-filter:blur(4px)}
.card:hover .card-fav{opacity:1}.card-fav.on{opacity:1;color:var(--red);background:rgba(229,9,20,.2)}

/* RANK */
.rank-card{flex-shrink:0;width:180px;cursor:pointer;display:flex;align-items:flex-end;scroll-snap-align:start;transition:transform .3s}
.rank-card:hover{transform:translateY(-8px)}
.rank-num{font-family:'Bebas Neue',sans-serif;font-size:8rem;font-weight:400;line-height:1;color:transparent;-webkit-text-stroke:3px var(--s3);margin-left:-20px;flex-shrink:0;transition:all .3s;letter-spacing:-4px}
.rank-card:hover .rank-num{-webkit-text-stroke-color:var(--red);filter:drop-shadow(0 0 8px rgba(229,9,20,.3))}
.rank-img{width:128px;height:192px;object-fit:cover;border-radius:10px;background:var(--s2);transition:box-shadow .3s}
.rank-card:hover .rank-img{box-shadow:0 16px 48px rgba(229,9,20,.35)}

/* WIDE */
.wide-card{flex-shrink:0;width:280px;cursor:pointer;scroll-snap-align:start;transition:transform .3s;position:relative;border-radius:12px;overflow:hidden}
.wide-card:hover{transform:translateY(-6px)}
.wide-img{width:280px;height:158px;object-fit:cover;display:block;transition:transform .4s}
.wide-card:hover .wide-img{transform:scale(1.05)}
.wide-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(6,6,8,.9) 0%,transparent 55%);opacity:0;transition:opacity .3s}
.wide-card:hover .wide-ov{opacity:1}
.wide-info{position:absolute;bottom:0;left:0;right:0;padding:.7rem .8rem;transform:translateY(6px);opacity:0;transition:all .3s}
.wide-card:hover .wide-info{opacity:1;transform:translateY(0)}
.wide-title-static{font-size:.8rem;font-weight:700;padding:.5rem .2rem .1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wide-meta{font-size:.65rem;color:var(--t3);padding:0 .2rem .3rem}
.wide-play{font-size:.75rem;color:#fff;font-weight:700;display:flex;align-items:center;gap:.3rem}

/* SKEL */
.skel{background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:200% 100%;animation:sh 1.6s ease infinite;border-radius:var(--r)}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* DETAIL */
.det-hero{position:relative;height:65vh;min-height:440px;display:flex;align-items:flex-end;overflow:hidden}
.det-bg{position:absolute;inset:0}
.det-bg img{width:100%;height:100%;object-fit:cover;filter:brightness(.85)}
.det-ov{position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,rgba(6,6,8,.55) 40%,transparent 100%)}
.det-c{position:relative;z-index:2;padding:3rem}
.det-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,5vw,3.8rem);font-weight:400;line-height:1;margin-bottom:.5rem;letter-spacing:2px}
.det-body{display:grid;grid-template-columns:1fr 290px;gap:2rem;padding:2rem 2.5rem;max-width:1400px;margin:0 auto}
@media(max-width:880px){.det-body{grid-template-columns:1fr}}
.det-desc{color:var(--t2);font-size:.9rem;line-height:1.8;margin-bottom:1.5rem;font-family:'Tajawal',sans-serif}
.itag{background:var(--s2);border:1px solid var(--s3);border-radius:6px;padding:.28rem .65rem;font-size:.71rem;color:var(--t2)}
.cast-row{display:flex;gap:.8rem;flex-wrap:wrap;margin-top:.7rem}
.cast-item{display:flex;flex-direction:column;align-items:center;gap:.3rem;width:62px}
.cast-img{width:52px;height:52px;border-radius:50%;object-fit:cover;background:var(--s2);border:2px solid var(--s3)}
.cast-nm{font-size:.6rem;text-align:center;color:var(--t2);line-height:1.2}
.sb-card{background:var(--bg2);border:1px solid var(--s2);border-radius:var(--r2);padding:1.2rem;margin-bottom:.9rem}
.sb-title{font-family:'Oswald',sans-serif;font-size:.82rem;font-weight:600;letter-spacing:.4px;margin-bottom:.9rem;color:var(--t2);text-transform:uppercase}
.act-btn{display:block;width:100%;padding:.72rem;background:var(--s2);border:1px solid var(--s3);border-radius:8px;color:var(--t1);cursor:pointer;font-family:'Cairo',sans-serif;font-size:.8rem;text-align:center;margin-bottom:.5rem;transition:all .25s}
.act-btn:hover{background:var(--s3);border-color:var(--red)}
.act-btn.fav{background:var(--redbg);border-color:var(--redbr);color:var(--red3)}

/* EPISODES */
.season-tabs{display:flex;gap:.45rem;flex-wrap:wrap;margin-bottom:1.1rem}
.s-tab{padding:.42rem 1rem;background:var(--s2);border:1px solid var(--s3);border-radius:6px;color:var(--t2);cursor:pointer;font-size:.76rem;font-family:'Cairo',sans-serif;transition:all .25s}
.s-tab:hover,.s-tab.a{background:var(--red);border-color:var(--red);color:#fff;font-weight:700}
.ep-item{display:flex;align-items:center;gap:1rem;padding:.9rem;background:var(--bg2);border:1px solid var(--s2);border-radius:var(--r);cursor:pointer;margin-bottom:.55rem;transition:all .25s}
.ep-item:hover{background:var(--s1);border-color:var(--s3);transform:translateX(-4px)}
.ep-num{font-family:'Oswald',sans-serif;font-size:1.4rem;font-weight:700;color:var(--t4);width:30px;flex-shrink:0;text-align:center}
.ep-thumb{width:120px;height:68px;object-fit:cover;border-radius:6px;background:var(--s2);flex-shrink:0}
.ep-info{flex:1;min-width:0}
.ep-title{font-weight:700;font-size:.84rem;margin-bottom:.18rem}
.ep-desc{font-size:.72rem;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ep-dur{font-size:.67rem;color:var(--t4);margin-top:.18rem}
.ep-actions{display:flex;gap:.4rem;flex-shrink:0}
.ep-dl-btn{padding:.3rem .65rem;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.25);border-radius:6px;color:var(--cyan);font-size:.68rem;cursor:pointer;transition:all .22s;font-family:'Cairo',sans-serif;white-space:nowrap}
.ep-dl-btn:hover{background:rgba(0,212,255,.2)}

/* ══ PLAYER ══════════════════════════════════════════════ */

/* ═══════════ DB LAYER ════════════════════════════════════ */
const DB = {
  async login(email, password) {
    const { data, error } = await sb.auth.signInWithPassword({
      email: email.trim().toLowerCase(), password
    });
    if (error) throw new Error(
      error.message.includes('Invalid') ? 'البريد أو كلمة المرور غير صحيحة' :
      error.message.includes('Email not confirmed') ? 'يرجى تأكيد البريد الإلكتروني' :
      error.message
    );
    return data;
  },
  async register(email, password, username) {
    const { data, error } = await sb.auth.signUp({
      email: email.trim().toLowerCase(), password,
      options: { data: { username, full_name: username } }
    });
    if (error) throw new Error(error.message);
    if (data.user) {
      await sb.from('profiles').upsert({
        id: data.user.id, username, full_name: username,
        avatar_url: `https://api.dicebear.com/7.x/avataaars/svg?seed=${email}`,
        is_admin: false
      });
    }
    return data;
  },
  async logout() { await sb.auth.signOut(); },
  async getProfile(uid) {
    const { data } = await sb.from('profiles').select('*').eq('id', uid).single();
    return data;
  },
  async updateProfile(uid, updates) {
    const { data, error } = await sb.from('profiles').update(updates).eq('id', uid).select().single();
    if (error) throw error;
    return data;
  },
  async changePassword(newPwd) {
    const { error } = await sb.auth.updateUser({ password: newPwd });
    if (error) throw error;
  },
  async getAllContent() {
    const { data, error } = await sb.from('content').select('*').eq('is_published', true).order('created_at', { ascending: false });
    if (error) throw error;
    return data || [];
  },
  async getContent(id) {
    const { data, error } = await sb.from('content')
      .select(`*, seasons(*, episodes(*))`)
      .eq('id', id).single();
    if (error) throw error;
    if (data?.seasons) {
      data.seasons.sort((a, b) => a.season_num - b.season_num);
      data.seasons.forEach(s => s.episodes?.sort((a, b) => a.ep_num - b.ep_num));
    }
    return data;
  },
  async searchContent(q) {
    const { data } = await sb.from('content').select('*')
      .or(`title.ilike.%${q}%,title_en.ilike.%${q}%,description.ilike.%${q}%`)
      .eq('is_published', true).limit(24);
    return data || [];
  },
  async createContent(payload) {
    const { data, error } = await sb.from('content').insert(payload).select().single();
    if (error) throw error;
    return data;
  },
  async updateContent(id, payload) {
    const { data, error } = await sb.from('content')
      .update({ ...payload, updated_at: new Date().toISOString() })
      .eq('id', id).select().single();
    if (error) throw error;
    return data;
  },
  async deleteContent(id) {
    const { error } = await sb.from('content').delete().eq('id', id);
    if (error) throw error;
  },
  async createSeason(contentId, title, num) {
    const { data, error } = await sb.from('seasons')
      .insert({ content_id: contentId, title, season_num: num }).select().single();
    if (error) throw error;
    return { ...data, episodes: [] };
  },
  async deleteSeason(id) {
    const { error } = await sb.from('seasons').delete().eq('id', id);
    if (error) throw error;
  },
  async createEpisode(seasonId, contentId, payload) {
    const { data, error } = await sb.from('episodes')
      .insert({ season_id: seasonId, content_id: contentId, ...payload }).select().single();
    if (error) throw error;
    return data;
  },
  async updateEpisode(id, payload) {
    const { data, error } = await sb.from('episodes')
      .update({ ...payload, updated_at: new Date().toISOString() })
      .eq('id', id).select().single();
    if (error) throw error;
    return data;
  },
  async deleteEpisode(id) {
    const { error } = await sb.from('episodes').delete().eq('id', id);
    if (error) throw error;
  },
  async getFavorites(uid) {
    const { data } = await sb.from('favorites').select('*, content(*)').eq('user_id', uid).order('created_at', { ascending: false });
    return data || [];
  },
  async toggleFavorite(uid, contentId) {
    const { data: ex } = await sb.from('favorites').select('id').eq('user_id', uid).eq('content_id', contentId).single();
    if (ex) { await sb.from('favorites').delete().eq('id', ex.id); return false; }
    await sb.from('favorites').insert({ user_id: uid, content_id: contentId });
    return true;
  },
  async getHistory(uid) {
    const { data } = await sb.from('watch_history').select('*, content(*)').eq('user_id', uid)
      .order('watched_at', { ascending: false }).limit(30);
    return data || [];
  },
  async addHistory(uid, contentId, episodeId = null) {
    try {
      await sb.from('watch_history').upsert(
        { user_id: uid, content_id: contentId, episode_id: episodeId, watched_at: new Date().toISOString() },
        { onConflict: 'user_id,content_id,episode_id' }
      );
    } catch(_) {}
  },
  // ── USERS (admin) ──
  async getAllUsers() {
    const { data, error } = await sb.from('profiles').select('*, auth_users:id(email)').order('created_at', { ascending: false });
    // fallback: just profiles
    if (error || !data) {
      const { data: d2 } = await sb.from('profiles').select('*').order('created_at', { ascending: false });
      return d2 || [];
    }
    return data;
  },
  async getUsersWithEmail() {
    // Use RPC or direct profiles table
    const { data } = await sb.from('profiles').select('*').order('created_at', { ascending: false });
    return data || [];
  },
  async toggleUserAdmin(uid, current) {
    await sb.from('profiles').update({ is_admin: !current }).eq('id', uid);
  },
};

/* ═══════════ TINY COMPONENTS ════════════════════════════ */
function Toast({ msg, type = '', onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3200); return () => clearTimeout(t); }, []);
  return <div className={`toast ${type}`} onClick={onClose}>{msg}</div>;
}
function Confirm({ msg, onYes, onNo }) {
  return (
    <div className="modal-bd" onClick={e => e.target === e.currentTarget && onNo()}>
      <div className="confirm-box" style={{ marginTop: '8rem' }}>
        <div style={{ fontSize: '2.5rem', marginBottom: '.9rem' }}>⚠️</div>
        <div style={{ color: 'var(--t2)', fontSize: '.88rem', lineHeight: 1.6, marginBottom: '1.5rem' }}>{msg}</div>

/* ═══════════ AUTH PAGE ═══════════════════════════════════ */
function AuthPage({ onAuth }) {
  const [tab, setTab] = useState('login');
  const [f, setF] = useState({ email: '', password: '', username: '', confirm: '' });
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');
  const inp = (k, v) => { setF(p => ({ ...p, [k]: v })); setErr(''); };

  const submit = async () => {
    setErr('');
    if (!f.email || !f.password) { setErr('يرجى ملء جميع الحقول'); return; }
    if (tab === 'register') {
      if (!f.username) { setErr('يرجى إدخال اسم المستخدم'); return; }
      if (f.password !== f.confirm) { setErr('كلمة المرور غير متطابقة'); return; }
      if (f.password.length < 6) { setErr('كلمة المرور 6 أحرف على الأقل'); return; }
    }
    setLoading(true);
    try {
      if (tab === 'login') {
        const data = await DB.login(f.email, f.password);
        if (data.user) { const p = await DB.getProfile(data.user.id); onAuth(data.user, p); }
      } else {
        await DB.register(f.email, f.password, f.username);
        const data = await DB.login(f.email, f.password);
        if (data.user) { const p = await DB.getProfile(data.user.id); onAuth(data.user, p); }
      }
    } catch (e) { setErr(e.message); }
    setLoading(false);
  };

  return (
    <div className="auth-page">
      <div className="auth-bg" />
      <div className="auth-box">
        <div className="auth-logo"><span style={{ color:'#fff' }}>FLIX</span><span style={{ color:'var(--red)' }}>TN</span></div>
        <div className="auth-sub">السينما العربية والتونسية والعالمية</div>
        <div className="auth-tabs">
          <button className={`at ${tab==='login'?'a':''}`} onClick={() => { setTab('login'); setErr(''); }}>تسجيل الدخول</button>
          <button className={`at ${tab==='register'?'a':''}`} onClick={() => { setTab('register'); setErr(''); }}>إنشاء حساب</button>
        </div>
        {err && <div className="ferr">⚠ {err}</div>}
        {tab === 'register' && <div className="fg"><label className="fl">اسم المستخدم</label><input className="fi fi-r" value={f.username} onChange={e => inp('username', e.target.value)} placeholder="اسمك" /></div>}
        <div className="fg"><label className="fl">البريد الإلكتروني</label><input className="fi" type="email" value={f.email} onChange={e => inp('email', e.target.value)} placeholder="email@example.com" /></div>
        <div className="fg"><label className="fl">كلمة المرور</label><input className="fi" type="password" value={f.password} onChange={e => inp('password', e.target.value)} placeholder="••••••••" onKeyDown={e => e.key==='Enter'&&submit()} /></div>
        {tab === 'register' && <div className="fg"><label className="fl">تأكيد كلمة المرور</label><input className="fi" type="password" value={f.confirm} onChange={e => inp('confirm', e.target.value)} placeholder="••••••••" onKeyDown={e => e.key==='Enter'&&submit()} /></div>}
        <button className="btn-auth" onClick={submit} disabled={loading}>
          {loading ? <span style={{ display:'flex',alignItems:'center',justifyContent:'center',gap:'.4rem' }}><Spin sm />جاري...</span> : tab==='login'?'دخول':'إنشاء الحساب'}
        </button>
      </div>
    </div>
  );
}

/* ═══════════ PLAYER PAGE (with +10/-10) ══════════════════ */
function PlayerPage({ item, episode, onBack }) {
  const videoRef = useRef(null);
  const [isIframe, setIsIframe] = useState(false);
  const [playing, setPlaying] = useState(false);
  const [progress, setProgress] = useState(0);
  const [duration, setDuration] = useState(0);
  const [err, setErr] = useState(false);

  const rawUrl = episode?.video_url || item?.video_url;
  const isDirect = rawUrl && /\.(mp4|webm|ogg)(\?|$)/i.test(rawUrl);

  const getEmbed = (url) => {
    if (!url) return null;
    if (url.includes('/embed/') || url.includes('player.vimeo') || url.includes('dailymotion.com/embed')) return url;
    const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    if (yt) return `https://www.youtube.com/embed/${yt[1]}?autoplay=1&rel=0&controls=1`;
    const dm = url.match(/dailymotion\.com\/video\/([a-zA-Z0-9]+)/);
    if (dm) return `https://www.dailymotion.com/embed/video/${dm[1]}?autoplay=1`;
    const vi = url.match(/vimeo\.com\/(\d+)/);
    if (vi) return `https://player.vimeo.com/video/${vi[1]}?autoplay=1`;
    return url;
  };

  const embedUrl = !isDirect ? getEmbed(rawUrl) : null;
  const showIframe = !isDirect && embedUrl && !err;
  const title = episode ? `${item?.title} — ${episode.title}` : item?.title;

  // Video controls (only for direct video)
  const seek = (sec) => {
    if (videoRef.current) { videoRef.current.currentTime += sec; }
  };
  const togglePlay = () => {
    if (videoRef.current) {
      if (videoRef.current.paused) { videoRef.current.play(); setPlaying(true); }
      else { videoRef.current.pause(); setPlaying(false); }
    }
  };

  useEffect(() => {
    setIsIframe(!isDirect && !!embedUrl);
  }, [rawUrl]);

  return (
    <div className="player-page">
      <div className="player-nav">
        <button className="player-back" onClick={onBack}>← رجوع</button>
        <span style={{ fontWeight:700,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontFamily:"'Cairo',sans-serif",fontSize:'.88rem' }}>{title}</span>
        {rawUrl && <a href={rawUrl} target="_blank" rel="noreferrer" style={{ color:'var(--cyan)',fontSize:'.72rem',whiteSpace:'nowrap' }}>🔗 الرابط الأصلي</a>}
      </div>

      <div className="player-outer">
        {/* VIDEO */}
        {!rawUrl && (
          <div className="player-no-video"><div style={{ fontSize:'3rem',opacity:.25 }}>🎬</div><div>لا يوجد رابط فيديو</div></div>
        )}
        {rawUrl && isDirect && (
          <div className="player-inner">
            <video ref={videoRef} controls autoPlay
              onTimeUpdate={e => { setProgress(e.target.currentTime); setDuration(e.target.duration || 0); }}
              onPlay={() => setPlaying(true)} onPause={() => setPlaying(false)}
              style={{ position:'absolute',inset:0,width:'100%',height:'100%',background:'#000' }}>
              <source src={rawUrl} />
            </video>
          </div>
        )}
        {rawUrl && showIframe && (
          <div className="player-inner">
            <iframe key={embedUrl} src={embedUrl} title={title} allowFullScreen
              allow="autoplay; fullscreen; picture-in-picture; encrypted-media"
              referrerPolicy="no-referrer-when-downgrade"
              style={{ position:'absolute',inset:0,width:'100%',height:'100%',border:'none' }}
              onError={() => setErr(true)} />
          </div>
        )}
        {rawUrl && !isDirect && err && (
          <div className="player-no-video">
            <div style={{ fontSize:'2rem',opacity:.3 }}>⚠️</div>
            <div>تعذّر تحميل الفيديو</div>
            <a href={rawUrl} target="_blank" rel="noreferrer"
              style={{ padding:'.6rem 1.3rem',background:'var(--red)',color:'#fff',borderRadius:8,textDecoration:'none',fontSize:'.82rem',fontFamily:"'Cairo',sans-serif" }}>
              فتح في تبويب جديد
            </a>
          </div>
        )}

        {/* ── CONTROLS ── */}
        {rawUrl && (
          <>
            {/* Progress bar — for direct video */}
            {isDirect && duration > 0 && (
              <div className="player-progress-wrap">
                <div className="player-progress" onClick={e => {
                  const rect = e.currentTarget.getBoundingClientRect();
                  const pct = (e.clientX - rect.left) / rect.width;
                  if (videoRef.current) videoRef.current.currentTime = pct * duration;
                }}>
                  <div className="player-progress-fill" style={{ width: `${(progress/duration)*100}%` }} />
                </div>
                <div style={{ display:'flex',justifyContent:'space-between',marginTop:'.3rem',fontSize:'.66rem',color:'var(--t3)' }}>
                  <span>{Math.floor(progress/60)}:{String(Math.floor(progress%60)).padStart(2,'0')}</span>
                  <span>{Math.floor(duration/60)}:{String(Math.floor(duration%60)).padStart(2,'0')}</span>
                </div>
              </div>
            )}

            {/* +10 / -10 buttons — always visible */}
            <div className="player-controls">
              <button className="pc-btn" onClick={() => seek(-10)} title="10 ثواني للخلف">
                ⏪ <span>10-</span>
              </button>
              {isDirect && (
                <button className="pc-btn main" onClick={togglePlay}>
                  {playing ? '⏸ إيقاف' : '▶ تشغيل'}
                </button>
              )}
              <button className="pc-btn" onClick={() => seek(10)} title="10 ثواني للأمام">
                <span>10+</span> ⏩
              </button>
              {rawUrl && (
                <a href={rawUrl} download target="_blank" rel="noreferrer" style={{ textDecoration:'none' }}>
                  <button className="pc-btn dl">⬇ تحميل</button>
                </a>
              )}
            </div>
          </>
        )}
      </div>

      {/* INFO */}
      {item && (
        <div className="player-info">
          <div style={{ display:'flex',gap:'.5rem',flexWrap:'wrap',marginBottom:'.8rem' }}>
            {item.genre?.map(g => <span key={g} className="gpill">{g}</span>)}
            <span style={{ color:'var(--t3)',fontSize:'.78rem' }}>{item.year}</span>
            <span style={{ color:'#f5c518',fontSize:'.8rem' }}>★ {item.rating}</span>
          </div>
          <h2 style={{ fontFamily:"'Oswald',sans-serif",fontSize:'1.3rem',fontWeight:600,marginBottom:'.6rem' }}>{title}</h2>
          <p style={{ color:'var(--t2)',fontSize:'.86rem',lineHeight:1.75,fontFamily:"'Tajawal',sans-serif" }}>{episode?.description || item?.description}</p>
        </div>
      )}
    </div>
  );
}

/* ═══════════ SEARCH ══════════════════════════════════════ */
function SearchOverlay({ movies, series, onItemClick, onClose }) {
  const [q, setQ] = useState('');
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const timer = useRef(null);
  const all = [...movies, ...series];
  useEffect(() => {
    if (q.length < 2) { setResults([]); return; }
    clearTimeout(timer.current);
    timer.current = setTimeout(async () => {
      setLoading(true);
      const r = await DB.searchContent(q).catch(() => []);
      setResults(r); setLoading(false);
    }, 320);
    return () => clearTimeout(timer.current);
  }, [q]);
  return (
    <div className="search-ov" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="search-box">
        <div className="search-field">
          <span>🔍</span>
          <input className="search-in" autoFocus placeholder="ابحث..." value={q} onChange={e=>setQ(e.target.value)} />
          {loading && <Spin sm />}
          <button style={{ background:'var(--s2)',border:'none',color:'var(--t2)',width:30,height:30,borderRadius:'50%',cursor:'pointer' }} onClick={onClose}>✕</button>
        </div>
        {q.length < 2 ? (
          <><div className="s-lbl">الأكثر بحثاً</div><div className="s-grid">{all.filter(x=>x.is_trending).slice(0,10).map(it=><MovieCard key={it.id} item={it} onClick={i=>{onItemClick(i);onClose();}} showType />)}</div></>
        ) : results.length === 0 && !loading ? (
          <div className="empty"><div style={{ fontSize:'3rem',opacity:.3 }}>🔍</div><div style={{ marginTop:'1rem' }}>لا توجد نتائج</div></div>
        ) : (
          <><div className="s-lbl">{results.length} نتيجة</div><div className="s-grid">{results.map(it=><MovieCard key={it.id} item={it} onClick={i=>{onItemClick(i);onClose();}} showType />)}</div></>
        )}
      </div>
    </div>
  );
}

/* ═══════════ ADMIN — CONTENT FORM ═══════════════════════ */
function ContentFormModal({ item, onClose, onSaved, showToast }) {
  const isNew = !item?.id;
  const [type, setType] = useState(item?.type||'movie');
  const [saving, setSaving] = useState(false);
  const [err, setErr] = useState('');
  const [f, setF] = useState({
    title: item?.title||'', title_en: item?.title_en||'',
    year: item?.year||new Date().getFullYear(), rating: item?.rating||7.5,
    genre: (item?.genre||[]).join('، '), category: item?.category||'international',
    poster_url: item?.poster_url||item?.poster||'', backdrop_url: item?.backdrop_url||item?.backdrop||'',
    description: item?.description||'', cast_list: (item?.cast_list||[]).join('، '),
    director: item?.director||'', duration: item?.duration||'',
    video_url: item?.video_url||'', trailer_url: item?.trailer_url||'',
    is_featured: item?.is_featured||false, is_trending: item?.is_trending||false, match_pct: item?.match_pct||90,
  });
  const inp = (k,v) => setF(p=>({...p,[k]:v}));

  const save = async () => {
    if (!f.title.trim()) { setErr('العنوان مطلوب'); return; }
    setSaving(true); setErr('');
    const payload = {
      type, ...f,
      year: parseInt(f.year)||new Date().getFullYear(),
      rating: parseFloat(f.rating)||7.0,
      genre: f.genre.split(/[,،]/).map(x=>x.trim()).filter(Boolean),
      cast_list: f.cast_list.split(/[,،]/).map(x=>x.trim()).filter(Boolean),
      poster_url: f.poster_url||`https://picsum.photos/seed/${Date.now()}/300/450`,
      backdrop_url: f.backdrop_url||`https://picsum.photos/seed/${Date.now()}b/1280/720`,
    };
    try {
      const saved = isNew ? await DB.createContent(payload) : await DB.updateContent(item.id, payload);
      showToast(isNew?'✓ تمت الإضافة':'✓ تم الحفظ');
      onSaved(saved);
    } catch (e) { setErr(e.message); }
    setSaving(false);
  };

  return (
    <div className="modal-bd" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box">
        <div className="modal-hd">
          <h3>{isNew?`➕ ${type==='movie'?'فيلم جديد':'مسلسل جديد'}`:`✏ تعديل: ${item.title}`}</h3>
          <button className="modal-x" onClick={onClose}>✕</button>
        </div>
        {isNew && (
          <div style={{ display:'flex',gap:'.5rem',marginBottom:'1rem' }}>
            {['movie','series'].map(t=><div key={t} className={`chip ${type===t?'a':''}`} onClick={()=>setType(t)}>{t==='movie'?'🎬 فيلم':'📺 مسلسل'}</div>)}
          </div>
        )}
        {err && <div className="ferr">⚠ {err}</div>}
        <div className="form-grid">
          <div className="fg"><label className="fl">العنوان *</label><input className="fi fi-r" value={f.title} onChange={e=>inp('title',e.target.value)} /></div>
          <div className="fg"><label className="fl">English Title</label><input className="fi" value={f.title_en} onChange={e=>inp('title_en',e.target.value)} /></div>
          <div className="fg"><label className="fl">السنة</label><input className="fi" value={f.year} onChange={e=>inp('year',e.target.value)} /></div>
          <div className="fg"><label className="fl">التقييم (0-10)</label><input className="fi" value={f.rating} onChange={e=>inp('rating',e.target.value)} /></div>
          <div className="fg"><label className="fl">التصنيف</label>
            <select className="fsel" value={f.category} onChange={e=>inp('category',e.target.value)}>
              <option value="arabic">🇸🇦 عربي</option><option value="tunisian">🇹🇳 تونسي</option><option value="international">🌍 عالمي</option>
            </select>
          </div>
          {type==='movie'&&<div className="fg"><label className="fl">المدة</label><input className="fi" value={f.duration} onChange={e=>inp('duration',e.target.value)} placeholder="2س 15د" /></div>}
          <div className="fg"><label className="fl">الأنواع (بفاصلة)</label><input className="fi fi-r" value={f.genre} onChange={e=>inp('genre',e.target.value)} placeholder="دراما، إثارة" /></div>
          <div className="fg"><label className="fl">المخرج</label><input className="fi fi-r" value={f.director} onChange={e=>inp('director',e.target.value)} /></div>
          <div className="fg form-full"><label className="fl">طاقم التمثيل (بفاصلة)</label><input className="fi fi-r" value={f.cast_list} onChange={e=>inp('cast_list',e.target.value)} /></div>
          {type==='movie'&&<div className="fg form-full"><label className="fl">رابط الفيديو (للمشاهدة)</label><input className="fi" value={f.video_url} onChange={e=>inp('video_url',e.target.value)} placeholder="https://youtube.com/watch?v=..." /></div>}
          <div className="fg"><label className="fl">رابط البوستر</label><input className="fi" value={f.poster_url} onChange={e=>inp('poster_url',e.target.value)} /></div>
          <div className="fg"><label className="fl">رابط الخلفية</label><input className="fi" value={f.backdrop_url} onChange={e=>inp('backdrop_url',e.target.value)} /></div>
          <div className="fg form-full"><label className="fl">الوصف</label><textarea className="ftarea" value={f.description} onChange={e=>inp('description',e.target.value)} /></div>
          <div className="fg form-full">
            <div className="fcheck-row">
              <label className="fcheck"><input type="checkbox" checked={f.is_featured} onChange={e=>inp('is_featured',e.target.checked)} /> مميز في الرئيسية</label>
              <label className="fcheck"><input type="checkbox" checked={f.is_trending} onChange={e=>inp('is_trending',e.target.checked)} /> 🔥 رائج</label>
            </div>
          </div>
        </div>
        <div style={{ display:'flex',gap:'.7rem',marginTop:'1.2rem' }}>
          <button onClick={save} disabled={saving} className="btn-play" style={{ fontSize:'.82rem' }}>
            {saving?<span style={{display:'flex',gap:'.4rem',alignItems:'center'}}><Spin sm />جاري...</span>:'💾 حفظ'}
          </button>
          <button onClick={onClose} style={{ padding:'.6rem 1.1rem',background:'var(--s2)',border:'1px solid var(--s3)',borderRadius:8,color:'var(--t2)',cursor:'pointer',fontFamily:"'Cairo',sans-serif",fontSize:'.82rem' }}>إلغاء</button>
        </div>
      </div>
    </div>
  );
}

  useEffect(() => {
    DB.getContent(series.id).then(d => {
      setSeasons(d?.seasons||[]);
      setLoadingFull(false);
    });
  }, [series.id]);

  const addSeason = async () => {
    if (!newSTitle.trim()) return;
    setLoading(true);
    try {
      const s = await DB.createSeason(series.id, newSTitle.trim(), seasons.length+1);
      setSeasons(p=>[...p,s]); setNewSTitle(''); setSelS(seasons.length);
      showToast('✓ تم إضافة الموسم');
    } catch(e) { showToast('خطأ: '+e.message); }
    setLoading(false);
  };

  const delSeason = async (sid) => {
    if (!window.confirm('حذف هذا الموسم وكل حلقاته؟')) return;
    await DB.deleteSeason(sid);
    const updated = seasons.filter(s=>s.id!==sid);
    setSeasons(updated); setSelS(0);
    showToast('تم حذف الموسم');
  };

  const addEp = async () => {
    if (!epF.title.trim()||seasons.length===0) return;
    setLoading(true);
    try {
      const epCount = seasons[selS]?.episodes?.length||0;
      const ep = await DB.createEpisode(seasons[selS].id, series.id, {
        ...epF, ep_num: parseInt(epF.ep_num)||epCount+1
      });
      setSeasons(p=>p.map((s,i)=>i===selS?{...s,episodes:[...(s.episodes||[]),ep]}:s));
      setEpF({title:'',ep_num:(epCount+2),description:'',duration:'',thumb_url:'',video_url:''});
      setAddingEp(false);
      showToast('✓ تمت إضافة الحلقة');
    } catch(e) { showToast('خطأ: '+e.message); }
    setLoading(false);
  };

  const saveEp = async (ep, updates) => {
    setLoading(true);
    try {
      const updated = await DB.updateEpisode(ep.id, updates);
      setSeasons(p=>p.map((s,i)=>i===selS?{...s,episodes:s.episodes.map(e=>e.id===ep.id?updated:e)}:s));
      setEditingEp(null);
      showToast('✓ تم حفظ الحلقة');
    } catch(e) { showToast('خطأ: '+e.message); }
    setLoading(false);
  };

  const delEp = async (epId) => {
    await DB.deleteEpisode(epId);
    setSeasons(p=>p.map((s,i)=>i===selS?{...s,episodes:s.episodes.filter(e=>e.id!==epId)}:s));
    showToast('تم حذف الحلقة');
  };

  if (loadingFull) return (
    <div className="modal-bd"><div className="modal-box" style={{ textAlign:'center',padding:'3rem' }}><Spin /></div></div>
  );

  const curEps = seasons[selS]?.episodes||[];

  return (
    <div className="modal-bd" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box" style={{ maxWidth:820 }}>
        <div className="modal-hd">
          <h3>📺 مواسم وحلقات: {series.title}</h3>
          <button className="modal-x" onClick={onClose}>✕</button>
        </div>

        {/* Add season */}
        <div style={{ display:'flex',gap:'.6rem',marginBottom:'1.2rem' }}>
          <input className="fi fi-r" style={{ flex:1 }} value={newSTitle} onChange={e=>setNewSTitle(e.target.value)}
            placeholder="اسم الموسم — مثال: الموسم الأول" onKeyDown={e=>e.key==='Enter'&&addSeason()} />
          <button onClick={addSeason} disabled={loading} className="btn-play" style={{ fontSize:'.8rem',padding:'.6rem 1.2rem',whiteSpace:'nowrap' }}>
            {loading?<Spin sm />:'+ إضافة موسم'}
          </button>
        </div>

        {seasons.length === 0 && (
          <div style={{ padding:'2rem',textAlign:'center',color:'var(--t4)',background:'var(--bg3)',borderRadius:8,border:'1px dashed var(--s3)',fontSize:'.82rem' }}>
            لا توجد مواسم بعد — أضف موسماً أولاً ⬆
          </div>
        )}

        {seasons.length > 0 && (
          <>
            {/* Season tabs */}
            <div className="season-tabs">
              {seasons.map((s,i)=>(
                <div key={s.id} style={{ display:'flex',alignItems:'center',gap:'.2rem' }}>
                  <button className={`s-tab ${selS===i?'a':''}`} onClick={()=>setSelS(i)}>
                    {s.title} <span style={{ opacity:.65,fontSize:'.63rem' }}>({s.episodes?.length||0} حلقة)</span>
                  </button>
                  <button onClick={()=>delSeason(s.id)} style={{ background:'none',border:'none',color:'var(--red3)',cursor:'pointer',fontSize:'.8rem',padding:'.2rem',opacity:.6 }}>🗑</button>
                </div>
              ))}
            </div>

            {/* Header */}
            <div style={{ display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'.9rem',padding:'.5rem 0',borderBottom:'1px solid var(--s2)' }}>
              <div style={{ fontWeight:700,fontSize:'.85rem',color:'var(--t2)' }}>
                {seasons[selS]?.title} — {curEps.length} حلقة
              </div>
              <button onClick={()=>{setAddingEp(true);setEpF(p=>({...p,ep_num:curEps.length+1}));}} className="a-btn a-grn" style={{ fontSize:'.78rem',padding:'.4rem .9rem' }}>
                ➕ إضافة حلقة جديدة
              </button>
            </div>

            {/* ADD EPISODE FORM */}
            {addingEp && (
              <div style={{ background:'var(--bg3)',border:'1px solid var(--red)',borderRadius:10,padding:'1.2rem',marginBottom:'1rem' }}>
                <div style={{ fontFamily:"'Oswald',sans-serif",fontSize:'.85rem',fontWeight:600,marginBottom:'.9rem',color:'var(--red3)' }}>
                  ➕ حلقة جديدة في: {seasons[selS]?.title}
                </div>
                <div className="form-grid">
                  <div className="fg"><label className="fl">عنوان الحلقة *</label><input className="fi fi-r" value={epF.title} onChange={e=>setEpF(p=>({...p,title:e.target.value}))} placeholder="مثال: الحلقة الأولى" /></div>
                  <div className="fg"><label className="fl">رقم الحلقة</label><input className="fi" type="number" min="1" value={epF.ep_num} onChange={e=>setEpF(p=>({...p,ep_num:e.target.value}))} /></div>
                  <div className="fg form-full">
                    <label className="fl">🔗 رابط الفيديو (YouTube, Dailymotion, MP4...)</label>
                    <input className="fi" value={epF.video_url} onChange={e=>setEpF(p=>({...p,video_url:e.target.value}))} placeholder="https://www.youtube.com/watch?v=XXXXXXXXXXX" />
                    {epF.video_url && <div style={{ fontSize:'.65rem',color:'var(--green)',marginTop:'.3rem' }}>✓ رابط مُدخَل: {epF.video_url.slice(0,50)}...</div>}
                  </div>
                  <div className="fg"><label className="fl">المدة</label><input className="fi" value={epF.duration} onChange={e=>setEpF(p=>({...p,duration:e.target.value}))} placeholder="45د" /></div>
                  <div className="fg"><label className="fl">صورة مصغرة (اختياري)</label><input className="fi" value={epF.thumb_url} onChange={e=>setEpF(p=>({...p,thumb_url:e.target.value}))} placeholder="https://..." /></div>
                  <div className="fg form-full"><label className="fl">الوصف (اختياري)</label><input className="fi fi-r" value={epF.description} onChange={e=>setEpF(p=>({...p,description:e.target.value}))} /></div>
                </div>
                <div style={{ display:'flex',gap:'.6rem',marginTop:'.5rem' }}>
                  <button onClick={addEp} disabled={loading} className="btn-play" style={{ fontSize:'.8rem',padding:'.6rem 1.2rem' }}>
                    {loading?<Spin sm />:'💾 حفظ الحلقة'}
                  </button>
                  <button onClick={()=>setAddingEp(false)} style={{ padding:'.6rem 1rem',background:'var(--s2)',border:'1px solid var(--s3)',borderRadius:7,color:'var(--t2)',cursor:'pointer',fontFamily:"'Cairo',sans-serif",fontSize:'.8rem' }}>إلغاء</button>
                </div>
              </div>
            )}

            {/* EPISODES LIST */}
            {curEps.length === 0 && !addingEp && (
              <div style={{ padding:'1.5rem',textAlign:'center',color:'var(--t4)',fontSize:'.82rem',background:'var(--bg3)',borderRadius:8,border:'1px dashed var(--s3)' }}>
                لا توجد حلقات في هذا الموسم — اضغط "إضافة حلقة جديدة" ⬆
              </div>
            )}

            {curEps.map((ep,i)=>(
              <div key={ep.id}>
                {editingEp?.id === ep.id ? (
                  <EpEditInline ep={ep} onSave={u=>saveEp(ep,u)} onCancel={()=>setEditingEp(null)} loading={loading} />
                ) : (
                  <div style={{ display:'flex',alignItems:'center',gap:'.8rem',padding:'.8rem .9rem',background:'var(--bg3)',border:'1px solid var(--s2)',borderRadius:9,marginBottom:'.5rem' }}>
                    <span style={{ fontFamily:"'Oswald',sans-serif",fontSize:'1.3rem',fontWeight:700,color:'var(--t4)',width:28,textAlign:'center',flexShrink:0 }}>{ep.ep_num||i+1}</span>
                    {ep.thumb_url
                      ? <img src={ep.thumb_url} alt="" style={{ width:80,height:46,objectFit:'cover',borderRadius:5,flexShrink:0 }} />
                      : <div style={{ width:80,height:46,background:'var(--s2)',borderRadius:5,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--t4)',flexShrink:0,fontSize:'.9rem' }}>▶</div>}
                    <div style={{ flex:1,minWidth:0 }}>
                      <div style={{ fontWeight:700,fontSize:'.83rem' }}>{ep.title}</div>
                      <div style={{ fontSize:'.7rem',color:'var(--t3)',marginTop:'.15rem',display:'flex',gap:'.6rem',flexWrap:'wrap' }}>
                        {ep.duration && <span>⏱ {ep.duration}</span>}
                        {ep.video_url
                          ? <span style={{ color:'var(--green)' }}>✓ رابط: {ep.video_url.slice(0,35)}...</span>
                          : <span style={{ color:'var(--red3)' }}>⚠ لا يوجد رابط فيديو</span>}
                      </div>
                    </div>
                    <div style={{ display:'flex',gap:'.35rem',flexShrink:0 }}>
                      <button onClick={()=>setEditingEp(ep)} className="a-btn a-edit">تعديل</button>
                      <button onClick={()=>delEp(ep.id)} className="a-btn a-del">حذف</button>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </>
        )}
      </div>
    </div>
  );
}

function EpEditInline({ ep, onSave, onCancel, loading }) {
  const [f,setF] = useState({ title:ep.title,ep_num:ep.ep_num,description:ep.description||'',duration:ep.duration||'',thumb_url:ep.thumb_url||'',video_url:ep.video_url||'' });
  return (
    <div style={{ background:'var(--s1)',border:'1px solid var(--red)',borderRadius:9,padding:'1rem',marginBottom:'.5rem' }}>
      <div className="form-grid">
        <div className="fg"><label className="fl">العنوان</label><input className="fi fi-r" value={f.title} onChange={e=>setF(p=>({...p,title:e.target.value}))} /></div>
        <div className="fg"><label className="fl">رقم الحلقة</label><input className="fi" type="number" value={f.ep_num} onChange={e=>setF(p=>({...p,ep_num:e.target.value}))} /></div>
        <div className="fg form-full">
          <label className="fl">🔗 رابط الفيديو</label>
          <input className="fi" value={f.video_url} onChange={e=>setF(p=>({...p,video_url:e.target.value}))} placeholder="https://youtube.com/watch?v=..." />
          {f.video_url && <div style={{ fontSize:'.63rem',color:'var(--green)',marginTop:'.25rem' }}>✓ {f.video_url.slice(0,60)}</div>}
        </div>
        <div className="fg"><label className="fl">المدة</label><input className="fi" value={f.duration} onChange={e=>setF(p=>({...p,duration:e.target.value}))} /></div>
        <div className="fg"><label className="fl">الصورة المصغرة</label><input className="fi" value={f.thumb_url} onChange={e=>setF(p=>({...p,thumb_url:e.target.value}))} /></div>
        <div className="fg form-full"><label className="fl">الوصف</label><input className="fi fi-r" value={f.description} onChange={e=>setF(p=>({...p,description:e.target.value}))} /></div>
      </div>
      <div style={{ display:'flex',gap:'.5rem',marginTop:'.5rem' }}>
        <button onClick={()=>onSave(f)} disabled={loading} className="btn-play" style={{ fontSize:'.78rem',padding:'.5rem 1rem' }}>{loading?<Spin sm />:'💾 حفظ'}</button>
        <button onClick={onCancel} style={{ padding:'.5rem .9rem',background:'var(--s2)',border:'1px solid var(--s3)',borderRadius:7,color:'var(--t2)',cursor:'pointer',fontFamily:"'Cairo',sans-serif",fontSize:'.78rem' }}>إلغاء</button>
      </div>
    </div>
  );
}

/* ═══════════ ADMIN PAGE ══════════════════════════════════ */
function AdminPage({ movies, series, goHome, onRefresh }) {
  const [tab, setTab]           = useState('stats');
  const [users, setUsers]       = useState([]);
  const [editItem, setEditItem]  = useState(null);
  const [seasonsItem, setSeasonsItem] = useState(null);
  const [confirm, setConfirm]   = useState(null);
  const [toast, setToast]       = useState({msg:'',type:''});
  const [loadingUsers, setLoadingUsers] = useState(false);
  const all = [...movies,...series];
  const showToast = (msg,type='ok') => { setToast({msg,type}); setTimeout(()=>setToast({msg:'',type:''}),3200); };

  useEffect(() => {
    if (tab==='users') {
      setLoadingUsers(true);
      DB.getUsersWithEmail().then(d=>{ setUsers(d); setLoadingUsers(false); });
    }
  }, [tab]);

  const handleDelete = (item) => {
    setConfirm({
      msg: `هل تريد حذف "${item.title}" نهائياً من قاعدة البيانات؟`,
      onYes: async () => {
        setConfirm(null);
        await DB.deleteContent(item.id);
        showToast('✓ تم الحذف نهائياً');
        onRefresh();
      }
    });
  };

  const toggleField = async (item, field) => {
    await DB.updateContent(item.id, { [field]: !item[field] });
    showToast('✓ تم التحديث'); onRefresh();
  };

  const catL = c => ({arabic:'عربي',tunisian:'تونسي',international:'عالمي'})[c]||c;

  return (
    <div className="adm-page">
      {toast.msg && <Toast msg={toast.msg} type={toast.type} onClose={()=>setToast({msg:'',type:''})} />}
      {confirm && <Confirm msg={confirm.msg} onYes={confirm.onYes} onNo={()=>setConfirm(null)} />}
      {editItem && (
        <ContentFormModal
          item={editItem==='new-movie'?{type:'movie'}:editItem==='new-series'?{type:'series'}:editItem}
          onClose={()=>setEditItem(null)}
          onSaved={()=>{ setEditItem(null); onRefresh(); }}
          showToast={showToast} />
      )}
      {seasonsItem && <SeasonsModal series={seasonsItem} onClose={()=>{ setSeasonsItem(null); onRefresh(); }} showToast={showToast} />}

      <div className="adm-hd">
        <div style={{ display:'flex',alignItems:'center',gap:'1rem' }}>
          <button onClick={goHome} style={{ padding:'.4rem .9rem',background:'var(--s2)',border:'1px solid var(--s3)',borderRadius:8,color:'var(--t2)',cursor:'pointer',fontFamily:"'Cairo',sans-serif",fontSize:'.78rem' }}>🏠 الرئيسية</button>
          <div className="adm-title"><span>FLIX</span><span style={{ color:'var(--red)' }}>TN</span></div>
          <span className="adm-badge">لوحة الإدارة</span>
        </div>
        <div style={{ fontSize:'.72rem',color:'var(--t4)' }}>{movies.length} فيلم · {series.length} مسلسل · {users.length||'—'} مستخدم</div>
      </div>

      <div className="adm-tabs">
        {[['stats','📊 إحصائيات'],['movies','🎬 الأفلام'],['series','📺 المسلسلات'],['users','👥 المستخدمون'],['add','➕ إضافة']].map(([k,l])=>(
          <button key={k} className={`a-tab ${tab===k?'a':''}`} onClick={()=>setTab(k)}>{l}</button>
        ))}
      </div>

      {/* STATS */}
      {tab==='stats' && (
        <div>
          <div className="stat-grid">
            {[
              [movies.length,'الأفلام','var(--cyan)'],
              [series.length,'المسلسلات','var(--purp)'],
              [series.reduce((a,s)=>a+(s.seasons?.length||0),0),'المواسم','var(--gold)'],
              [series.reduce((a,s)=>a+(s.seasons?.reduce((b,se)=>b+(se.episodes?.length||0),0)||0),0),'الحلقات','var(--green)'],
              [all.filter(x=>x.is_featured).length,'مميز','var(--red3)'],
              [all.filter(x=>x.is_trending).length,'رائج','var(--red3)'],
            ].map(([v,l,c])=>(
              <div key={l} className="stat-box"><div className="stat-val" style={{ color:c }}>{v}</div><div className="stat-lbl">{l}</div></div>
            ))}
          </div>
          <div className="adm-tw">
            <div style={{ padding:'1rem 1.2rem',borderBottom:'1px solid var(--s2)',fontFamily:"'Oswald',sans-serif",fontSize:'.85rem',fontWeight:600 }}>آخر الإضافات</div>
            <div style={{ overflowX:'auto' }}>
              <table className="at2">
                <thead><tr><th>الصورة</th><th>العنوان</th><th>النوع</th><th>التقييم</th><th>التصنيف</th></tr></thead>
                <tbody>{all.slice(0,8).map(it=>(
                  <tr key={it.id}>
                    <td><img className="a-thumb" src={it.poster_url||it.poster} alt="" onError={e=>e.target.src='https://picsum.photos/38/54'} /></td>
                    <td style={{ fontWeight:600 }}>{it.title}</td>
                    <td><span style={{ fontSize:'.68rem',background:'var(--s2)',padding:'.2rem .5rem',borderRadius:4 }}>{it.type==='movie'?'فيلم':'مسلسل'}</span></td>
                    <td><span style={{ color:'#f5c518',fontWeight:700 }}>★ {it.rating}</span></td>
                    <td style={{ fontSize:'.72rem',color:'var(--t3)' }}>{catL(it.category)}</td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {/* MOVIES TABLE */}
      {tab==='movies' && (
        <div>
          <div style={{ display:'flex',justifyContent:'space-between',marginBottom:'1rem',flexWrap:'wrap',gap:'.5rem' }}>
            <div style={{ fontSize:'.82rem',color:'var(--t3)' }}>{movies.length} فيلم في قاعدة البيانات</div>
            <button onClick={()=>setEditItem('new-movie')} className="btn-play" style={{ fontSize:'.78rem',padding:'.55rem 1.2rem' }}>+ فيلم جديد</button>
          </div>
          <div className="adm-tw" style={{ overflowX:'auto' }}>
            <table className="at2">
              <thead><tr><th>الصورة</th><th>العنوان</th><th>السنة</th><th>التقييم</th><th>تصنيف</th><th>فيديو</th><th>مميز</th><th>رائج</th><th>الإجراءات</th></tr></thead>
              <tbody>{movies.map(m=>(
                <tr key={m.id}>
                  <td><img className="a-thumb" src={m.poster_url||m.poster} alt="" onError={e=>e.target.src='https://picsum.photos/38/54'} /></td>
                  <td style={{ fontWeight:600,maxWidth:160 }}><div style={{ whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis' }}>{m.title}</div></td>
                  <td>{m.year}</td>
                  <td><span style={{ color:'#f5c518',fontWeight:700 }}>★ {m.rating}</span></td>
                  <td style={{ fontSize:'.72rem',color:'var(--t3)' }}>{catL(m.category)}</td>
                  <td>{m.video_url?<span style={{ color:'var(--green)',fontSize:'.72rem' }}>✓</span>:<span style={{ color:'var(--red3)',fontSize:'.72rem' }}>✗</span>}</td>
                  <td><button onClick={()=>toggleField(m,'is_featured')} className={`a-tog ${m.is_featured?'on':'off'}`}>{m.is_featured?'★ مميز':'تمييز'}</button></td>
                  <td><button onClick={()=>toggleField(m,'is_trending')} className={`a-tog ${m.is_trending?'on':'off'}`}>{m.is_trending?'🔥':'رائج'}</button></td>
                  <td><div style={{ display:'flex',gap:'.35rem' }}>
                    <button onClick={()=>setEditItem(m)} className="a-btn a-edit">تعديل</button>
                    <button onClick={()=>handleDelete(m)} className="a-btn a-del">حذف</button>
                  </div></td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        </div>
      )}

      {/* SERIES TABLE */}
      {tab==='series' && (
        <div>
          <div style={{ display:'flex',justifyContent:'space-between',marginBottom:'1rem',flexWrap:'wrap',gap:'.5rem' }}>
            <div style={{ fontSize:'.82rem',color:'var(--t3)' }}>{series.length} مسلسل في قاعدة البيانات</div>
            <button onClick={()=>setEditItem('new-series')} className="btn-play" style={{ fontSize:'.78rem',padding:'.55rem 1.2rem' }}>+ مسلسل جديد</button>
          </div>
          <div className="adm-tw" style={{ overflowX:'auto' }}>
            <table className="at2">
              <thead><tr><th>الصورة</th><th>العنوان</th><th>السنة</th><th>المواسم</th><th>الحلقات</th><th>الإجراءات</th></tr></thead>
              <tbody>{series.map(s=>(
                <tr key={s.id}>
                  <td><img className="a-thumb" src={s.poster_url||s.poster} alt="" onError={e=>e.target.src='https://picsum.photos/38/54'} /></td>
                  <td style={{ fontWeight:600,maxWidth:160 }}><div style={{ whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis' }}>{s.title}</div></td>
                  <td>{s.year}</td>
                  <td><span style={{ background:'rgba(0,212,255,.1)',color:'var(--cyan)',padding:'.18rem .45rem',borderRadius:4,fontSize:'.72rem',fontWeight:700 }}>{s.seasons?.length||0}</span></td>
                  <td><span style={{ background:'rgba(29,185,84,.1)',color:'var(--green)',padding:'.18rem .45rem',borderRadius:4,fontSize:'.72rem',fontWeight:700 }}>{s.seasons?.reduce((a,se)=>a+(se.episodes?.length||0),0)||0}</span></td>
                  <td><div style={{ display:'flex',gap:'.35rem',flexWrap:'wrap' }}>
                    <button onClick={()=>setEditItem(s)} className="a-btn a-edit">تعديل</button>
                    <button onClick={()=>setSeasonsItem(s)} className="a-btn a-grn">📺 المواسم والحلقات</button>
                    <button onClick={()=>handleDelete(s)} className="a-btn a-del">حذف</button>
                  </div></td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        </div>
      )}

      {/* USERS TABLE */}
      {tab==='users' && (
        <div className="adm-tw" style={{ overflowX:'auto' }}>
          <div style={{ padding:'1rem 1.2rem',borderBottom:'1px solid var(--s2)',display:'flex',alignItems:'center',justifyContent:'space-between' }}>
            <span style={{ fontFamily:"'Oswald',sans-serif",fontSize:'.85rem',fontWeight:600 }}>المستخدمون المسجلون</span>
            <span style={{ fontSize:'.72rem',color:'var(--t3)' }}>{users.length} مستخدم</span>
          </div>
          {loadingUsers ? <div style={{ padding:'2rem',textAlign:'center' }}><Spin /></div> : (
            <table className="at2">
              <thead><tr><th>الصورة</th><th>الاسم</th><th>المعرّف</th><th>تاريخ التسجيل</th><th>الدور</th><th>الإجراءات</th></tr></thead>
              <tbody>{users.map(u=>(
                <tr key={u.id}>
                  <td><img src={u.avatar_url||`https://api.dicebear.com/7.x/avataaars/svg?seed=${u.id}`} alt=""
                    style={{ width:36,height:36,borderRadius:'50%',objectFit:'cover',border:'2px solid var(--s3)',background:'var(--s2)' }} /></td>
                  <td style={{ fontWeight:600 }}>{u.username||u.full_name||'—'}</td>
                  <td style={{ fontSize:'.65rem',color:'var(--t3)',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap' }}>{u.id}</td>
                  <td style={{ fontSize:'.72rem',color:'var(--t3)' }}>{new Date(u.created_at).toLocaleDateString('ar-TN')}</td>
                  <td>
                    <span style={{
                      background:u.is_admin?'var(--redbg)':'rgba(29,185,84,.1)',
                      color:u.is_admin?'var(--red3)':'var(--green)',
                      border:`1px solid ${u.is_admin?'var(--redbr)':'rgba(29,185,84,.3)'}`,
                      padding:'.22rem .65rem',borderRadius:20,fontSize:'.66rem',fontWeight:700
                    }}>{u.is_admin?'👑 مدير':'✓ مستخدم'}</span>
                  </td>
                  <td>
                    <button onClick={async()=>{ await DB.toggleUserAdmin(u.id,u.is_admin); setUsers(prev=>prev.map(x=>x.id===u.id?{...x,is_admin:!u.is_admin}:x)); showToast('✓ تم تغيير الصلاحية'); }}
                      style={{ padding:'.28rem .65rem',background:'rgba(245,197,24,.1)',border:'1px solid rgba(245,197,24,.2)',borderRadius:5,color:'var(--gold)',cursor:'pointer',fontSize:'.67rem',fontFamily:"'Cairo',sans-serif" }}>
                      {u.is_admin?'إلغاء مدير':'ترقية مدير'}
                    </button>
                  </td>
                </tr>
              ))}</tbody>
            </table>
          )}
        </div>
      )}

      {/* ADD */}
      {tab==='add' && (
        <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem' }}>
          {[['movie','🎬','إضافة فيلم','أضف فيلماً جديداً مع رابط الفيديو'],['series','📺','إضافة مسلسل','أضف مسلسلاً ثم أدر مواسمه وحلقاته']].map(([t,icon,title,desc])=>(
            <div key={t} className="form-sec" style={{ textAlign:'center',cursor:'pointer',transition:'border-color .22s' }}
              onClick={()=>{ setEditItem(`new-${t}`); setTab(t==='movie'?'movies':'series'); }}>
              <div style={{ fontSize:'3rem',marginBottom:'.8rem' }}>{icon}</div>
              <div style={{ fontFamily:"'Oswald',sans-serif",fontSize:'1.1rem',fontWeight:600,marginBottom:'.4rem' }}>{title}</div>
              <div style={{ fontSize:'.78rem',color:'var(--t3)' }}>{desc}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ═══════════ ROOT APP ════════════════════════════════════ */
function App() {
  const [page, setPage]     = useState('home');
  const [user, setUser]     = useState(null);
  const [profile, setProfile] = useState(null);
  const [sessionLoad, setSessionLoad] = useState(true);
  const [movies, setMovies] = useState([]);
  const [series, setSeries] = useState([]);
  const [contentLoad, setContentLoad] = useState(true);
  const [favorites, setFavs] = useState([]);
  const [selectedId, setSelectedId] = useState(null);
  const [playerItem, setPlayerItem] = useState(null);
  const [playerEp, setPlayerEp] = useState(null);
  const [searchOpen, setSearchOpen] = useState(false);
  const [scrolled, setScrolled] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const [toast, setToast] = useState({msg:'',type:''});
  const showToast = useCallback((msg,type='ok')=>{ setToast({msg,type}); setTimeout(()=>setToast({msg:'',type:''}),3200); },[]);
  const nav = useCallback((p)=>{ setPage(p); window.scrollTo(0,0); },[]);

  // SESSION
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      if (session?.user) { setUser(session.user); DB.getProfile(session.user.id).then(setProfile); }
      setSessionLoad(false);
    });
    const {data:{subscription}} = sb.auth.onAuthStateChange(async(event,session)=>{
      if (event==='SIGNED_IN'&&session?.user) { setUser(session.user); DB.getProfile(session.user.id).then(setProfile); }
      else if (event==='SIGNED_OUT') { setUser(null); setProfile(null); setFavs([]); }
    });
    return ()=>subscription.unsubscribe();
  },[]);

  // CONTENT
  const loadContent = useCallback(()=>{
    setContentLoad(true);
    DB.getAllContent().then(all=>{
      setMovies(all.filter(c=>c.type==='movie'));
      setSeries(all.filter(c=>c.type==='series'));
      setContentLoad(false);
    }).catch(()=>setContentLoad(false));
  },[]);
  useEffect(()=>{ loadContent(); },[loadContent]);

  // FAVORITES
  useEffect(()=>{ if(user) DB.getFavorites(user.id).then(setFavs).catch(()=>{}); },[user]);

  // SCROLL
  useEffect(()=>{
    const fn=()=>setScrolled(window.scrollY>60);
    window.addEventListener('scroll',fn,{passive:true});
    return ()=>window.removeEventListener('scroll',fn);
  },[]);

  const handleAuth = useCallback((u,p)=>{ setUser(u); setProfile(p); nav('home'); showToast('مرحباً! تم تسجيل الدخول ✓'); },[nav,showToast]);
  const handleLogout = useCallback(async()=>{ await DB.logout(); setUser(null); setProfile(null); setFavs([]); setMenuOpen(false); nav('home'); showToast('تم تسجيل الخروج'); },[nav,showToast]);
  const handleItemClick = useCallback((item)=>{ setSelectedId(item.id); nav('detail'); },[nav]);
  const handlePlay = useCallback(async(item)=>{ setPlayerItem(item); setPlayerEp(null); nav('player'); if(user) DB.addHistory(user.id,item.id).catch(()=>{}); },[nav,user]);
  const handleSelectEp = useCallback(async(item,ep)=>{ setPlayerItem(item); setPlayerEp(ep); nav('player'); if(user) DB.addHistory(user.id,item.id,ep.id).catch(()=>{}); },[nav,user]);
  const handleFavToggle = useCallback(async(item)=>{
    if(!user){showToast('يرجى تسجيل الدخول','err');return;}
    const added = await DB.toggleFavorite(user.id,item.id);
    setFavs(prev=>added?[...prev,{content_id:item.id,content:item}]:prev.filter(f=>f.content_id!==item.id));
    showToast(added?'❤ أضيف للمفضلة':'تمت الإزالة من المفضلة');
  },[user,showToast]);
  const handleBack = useCallback(()=>{ if(page==='player'){nav(selectedId?'detail':'home');return;} nav('home'); },[page,selectedId,nav]);

  if (sessionLoad) return (
    <div><style>{CSS}</style>
    <div className="loading-sc"><div className="loading-logo"><span style={{color:'#fff'}}>FLIX</span><span style={{color:'var(--red)'}}>TN</span></div><Spin /></div></div>
  );

  const isAdmin = profile?.is_admin;
  const showNav = !['auth','player'].includes(page);
  const showFoot = !['auth','player','admin'].includes(page);
  const favIds = new Set(favorites.map(f=>f.content_id));

  return (
    <div>
      <style>{CSS}</style>
      {toast.msg && <Toast msg={toast.msg} type={toast.type} onClose={()=>setToast({msg:'',type:''})} />}
      {searchOpen && <SearchOverlay movies={movies} series={series} onItemClick={it=>{handleItemClick(it);setSearchOpen(false);}} onClose={()=>setSearchOpen(false)} />}

      {showNav && (
        <nav className={`nav ${scrolled?'s':'t'}`}>
          <div style={{display:'flex',alignItems:'center',gap:'2rem'}}>
            <div className="logo" onClick={()=>nav('home')}><span style={{color:'#fff'}}>FLIX</span><span style={{color:'var(--red)'}}>TN</span></div>
            <div className="nav-links">
              {[['home','الرئيسية'],['movies','الأفلام'],['series','المسلسلات']].map(([k,l])=>(
                <div key={k} className={`nl ${page===k?'a':''}`} onClick={()=>nav(k)}>{l}</div>
              ))}
              {isAdmin && <div className={`nl ${page==='admin'?'a':''}`} onClick={()=>nav('admin')}>⚙ الإدارة</div>}
            </div>
          </div>
          <div className="nav-r">
            <button className="ni" onClick={()=>setSearchOpen(true)}>🔍</button>
            {user ? (
              <div className="av-wrap">
                <img className="av" src={profile?.avatar_url||`https://api.dicebear.com/7.x/avataaars/svg?seed=${user.email}`} alt="" onClick={()=>setMenuOpen(!menuOpen)} onError={e=>e.target.src=`https://api.dicebear.com/7.x/initials/svg?seed=U`} />
                {menuOpen && (
                  <div className="umenu">
                    <div className="umenu-head">
                      <img src={profile?.avatar_url||`https://api.dicebear.com/7.x/avataaars/svg?seed=${user.email}`} alt="" onError={e=>e.target.src=`https://api.dicebear.com/7.x/initials/svg?seed=U`} />
                      <div><div className="nm">{profile?.username||'مستخدم'}</div><div className="em">{user.email}</div></div>
                    </div>
                    <button className="mi" onClick={()=>{nav('home');setMenuOpen(false);}}>🏠 الرئيسية</button>
                    <button className="mi" onClick={()=>{nav('profile');setMenuOpen(false);}}>👤 ملفي الشخصي</button>
                    {isAdmin && <button className="mi" onClick={()=>{nav('admin');setMenuOpen(false);}}>⚙ لوحة الإدارة</button>}
                    <div className="md" />
                    <button className="mi" style={{color:'var(--red3)'}} onClick={handleLogout}>🚪 تسجيل الخروج</button>
                  </div>
                )}
              </div>
            ) : (
              <div style={{display:'flex',gap:'.5rem'}}>
                <button className="btn-in" onClick={()=>nav('auth')}>دخول</button>
                <button className="btn-up" onClick={()=>nav('auth')}>انضم مجاناً</button>
              </div>
            )}
          </div>
        </nav>
      )}
      {menuOpen && <div style={{position:'fixed',inset:0,zIndex:150}} onClick={()=>setMenuOpen(false)} />}

      {page==='auth'    && <AuthPage onAuth={handleAuth} />}
      {page==='home'    && <HomePage movies={movies} series={series} loading={contentLoad} onItemClick={handleItemClick} onPlay={handlePlay} user={user} favorites={favorites} onFavToggle={handleFavToggle} />}
      {page==='movies'  && <ContentListPage type="movie"  items={movies} loading={contentLoad} onItemClick={handleItemClick} user={user} favorites={favorites} onFavToggle={handleFavToggle} />}
      {page==='series'  && <ContentListPage type="series" items={series} loading={contentLoad} onItemClick={handleItemClick} user={user} favorites={favorites} onFavToggle={handleFavToggle} />}
      {page==='detail'  && selectedId && <DetailPage itemId={selectedId} onPlay={handlePlay} onBack={handleBack} user={user} favorites={favorites} onFavToggle={handleFavToggle} onSelectEp={handleSelectEp} />}
      {page==='player'  && playerItem  && <PlayerPage item={playerItem} episode={playerEp} onBack={handleBack} />}
      {page==='profile' && user        && <ProfilePage user={user} profile={profile} onLogout={handleLogout} onProfileUpdate={setProfile} movies={movies} series={series} />}
      {page==='admin'   && isAdmin     && <AdminPage movies={movies} series={series} goHome={()=>nav('home')} onRefresh={loadContent} />}

      {showFoot && (
        <footer className="footer">
          <div className="ft-grid">
            <div><div className="ft-logo"><span>FLIX</span><span style={{color:'var(--red)'}}>TN</span></div><div style={{fontSize:'.75rem',color:'var(--t3)',lineHeight:1.7,maxWidth:280}}>بوابتك إلى السينما العربية والتونسية والعالمية.</div></div>
            <div><div style={{fontSize:'.65rem',textTransform:'uppercase',letterSpacing:'1px',color:'var(--t4)',fontWeight:700,marginBottom:'.8rem'}}>تصفح</div>{[['الرئيسية','home'],['الأفلام','movies'],['المسلسلات','series']].map(([l,k])=><span key={k} className="ft-link" onClick={()=>nav(k)}>{l}</span>)}</div>
            <div><div style={{fontSize:'.65rem',textTransform:'uppercase',letterSpacing:'1px',color:'var(--t4)',fontWeight:700,marginBottom:'.8rem'}}>الأنواع</div>{['دراما','أكشن','خيال علمي','كوميديا'].map(g=><span key={g} className="ft-link">{g}</span>)}</div>
            <div><div style={{fontSize:'.65rem',textTransform:'uppercase',letterSpacing:'1px',color:'var(--t4)',fontWeight:700,marginBottom:'.8rem'}}>الحساب</div>{user?[['👤 ملفي','profile'],['🚪 خروج','logout']].map(([l,k])=><span key={k} className="ft-link" onClick={()=>k==='logout'?handleLogout():nav(k)}>{l}</span>):[['دخول','auth'],['تسجيل','auth']].map(([l,k])=><span key={l} className="ft-link" onClick={()=>nav(k)}>{l}</span>)}</div>
          </div>
          <div className="ft-bot">
            <div style={{fontSize:'.7rem',color:'var(--t4)'}}>© {new Date().getFullYear()} FlixTN. جميع الحقوق محفوظة.</div>
          </div>
        </footer>
      )}
    </div>
  );
}

    document.getElementById('boot')?.remove();
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
